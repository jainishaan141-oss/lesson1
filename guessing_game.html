<!DOCTYPE html>

<html>

<head>

    <title>Lucky Draw</title>

    <style>
        body {

            font-family: Arial;

            text-align: center;

            margin-top: 50px;

        }

        input {

            padding: 10px;

            margin: 10px;

        }

        button {

            padding: 10px 20px;

            cursor: pointer;

        }

        #result {

            color: blue;

        }
    </style>

</head>

<body>

    <h1>Lucky Draw Game</h1>

    <input type="text" id="name" placeholder="Enter Name" required>

    <input type="number" id="guess" min="1" max="5" placeholder="Guess 1-5" required>

    <button onclick="checkLuck()">Check Luck</button>

    <h2 id="result"></h2>

    <p>Time on Page:

        <span id="timer">0</span> seconds

    </p>

<script>
let second = 0;
setInterval(function ()
{
    second++;
    document.getElementById("timer").innerHTML= second;

},1000);
function checkLuck()
{
    let name = document.getElementById("name").value;
    let guess = Number(document.getElementById("guess").value);
    let result = document.getElementById("result");
    if (name === "")
    {
        result.innerHTML = "please enter your name:";
        result.style.color = "red";
        return;
    }
    if(guess < 1 || guess > 5)
    {
        result.innerHTML = "enter number between 1 to 5:";
        result.style.color = "red";
        return;
    }
    let luckynumber = Math.floor(Math.random() * 5) + 1;
    if(guess === luckynumber)
    {
        result.innerHTML = "congratulations" + name + "you won! lucky number was" + luckynumber;
        result.style.color = "green";
    }
    else
    {
        result.innerHTML = "sorry" + name + " . better luck next time! lucky number was" + luckynumber;
        result.style.color = "blue";
    }
}
</script>
</body>
</html>
