<!DOCTYPE html>

<head>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
  
 <div id="demo" class="carousal-slide" data-bs-ride="carousal">
    <div class="carousal-indicators">
        <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
        <button class="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
    </div>

    <div class="carousal-inner">
        <div class="carousal-item-active"></div>
          <img src="https://www.bocadolobo.com/en/inspiration-and-ideas/wp-content/uploads/2024/12/Aston-Martin-DB11.webp" alt="futurestic car">

    <div class="carousal-item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/1925_Ford_Model_T_touring.jpg" alt="old vintage car">
    </div>

    <button class="carousal-control-prev" type="button" bata-bs-target="#demo" data-bs-slide="prev">
        <span class="carsoul-control-prev-icon"></span>
    </button>

    <button class="carousal-control-next" type="button" bata-bs-target="#demo" data-bs-slide="text">
        <span class="carsoul-control-next-icon"></span>
    </button>



 </div>   
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>



</body>
</html>
