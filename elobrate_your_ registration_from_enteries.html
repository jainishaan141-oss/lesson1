<!DOCTYPE html>

<head>
   
    <title>Document</title>
</head>
<body>
    
    <h2>details of user</h2>

    <form>
        <fieldset>
            <legend>personal information</legend>
            <label>first name:</label>
            <input type="text" id="fname" name="fname"><br><br>

            <label>last name:</label>
            <input type="text" id="iname" name="iname"><br><br>

            <label>gender:</label><br>
            <input type="radio" id="subject" value="male">male <br><br>
            <input type="radio" id="subject" value="female">female <br><br>
            <input type="radio" id="subject" value="other">other <br><br>
        
            <label>email:</label>
            <input type="email" id="email" name="email"> <br><br>
            <label>password:</label>
            <input type="email" id="password" name="password"><br><br>
            <label>birthday:</label>
            <input type="date" id="birthday" name="birthday"><br><br>
            <label>address:</label>
            <textarea name="description" id="address" cols="20" rows="20"></textarea><br><br>
            <input type="submit" id="submit" name="submit">
            <input type="reset" id="reset" name="reset">


        </fieldset>

    </form>


</body>
</html>
